services:
  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # 先用這個 service 把 HF cache 填滿（一次性）
  hf-prefetch:
    build:
      context: ./rag-api
    container_name: hf-prefetch
    env_file:
      - ./.env
    environment:
      - HF_HOME=/data/hf_cache
    volumes:
      - hf_cache:/data/hf_cache
    command: ["python", "-m", "app.prefetch"]
    restart: "no"
    depends_on:
      - qdrant

  rag-api:
    build:
      context: ./rag-api
    container_name: rag-api
    ports:
      - "8081:8000"
    env_file:
      - ./.env
    environment:
      - HF_HOME=/data/hf_cache
    depends_on:
      - qdrant
    volumes:
      - rag_uploads:/data/uploads
      - hf_cache:/data/hf_cache
    restart: unless-stopped

volumes:
  qdrant_data:
  rag_uploads:
  hf_cache: