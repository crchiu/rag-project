services:
  qdrant:
    image: qdrant/qdrant:v1.11.5
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  rag-api:
    build:
      context: ./rag-api
    container_name: rag-api
    ports:
      - "8081:8000"
    env_file:
      - ./.env
    depends_on:
      - qdrant
    volumes:
      - rag_uploads:/data/uploads
      - hf_cache:/data/hf_cache
    environment:
      - HF_HOME=/data/hf_cache
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    gpus: all
    restart: unless-stopped

volumes:
  qdrant_data:
  rag_uploads:
  hf_cache: